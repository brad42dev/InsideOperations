                  - /url: mailto:docs.ali@hexagon.com?subject=Feedback%20about%20%E2%80%9COperations%20Logbook%20examples%E2%80%9D%20in%20%E2%80%9Cj5%20Framework%20IndustraForm%20API%20Reference%E2%80%9D%20%5Bj5%5D%20%5BReference%5D&body=j5%20Framework%20IndustraForm%20API%20Reference%20%3E%20REST%20API%20%3E%20Parameter%20reference%20%3E%20Operations%20Logbook%20examples%0A%0A%5Ben-US%5D%20%5Bj5%5D%20%5BReference%5D%20%5B2019%5D%0A%0Ahttps%3A%2F%2Fdocs.hexagonppm.com%2Fr%2Fen-US%2Fj5-Framework-IndustraForm-API-Reference%2FVersion-28.0%2F1372581%0A__________________________________________________________________________________________%0A%0A%3E%20%0A%0A%20
                  - generic [ref=e131]: 
            - list [ref=e134]:
              - listitem [ref=e135]:
                - paragraph [ref=e136]: To query the operations logbook entries with an event time between 1 June 2023 00:00:00 and 30 June 2023 00:00:00.
                - paragraph [ref=e137]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status&pretty=true&from_date_time=2023-06-01T00:00:00Z&to_date_time=2023-06-30T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e138]:
                - paragraph [ref=e139]: To query the operations logbook entries with a $Form.Area that matches the specified area path.
                - paragraph [ref=e140]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Priority,CreatedByUser.DisplayValue&pretty=true&area=[area path]\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
                - paragraph [ref=e141]:
                  - img [ref=e142]
                - list [ref=e143]:
                  - listitem [ref=e144]:
                    - paragraph [ref=e145]: To find the area path, run the same query but without the "&area=…" and refer to the $Form.Area for the relevant fields.
                  - listitem [ref=e146]:
                    - paragraph [ref=e147]: Replace [area path] with your area path.
                - paragraph [ref=e148]: "For example:"
                - paragraph [ref=e149]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Priority,CreatedByUser.DisplayValue&pretty=true&area=9a138aad-a5f3-493d-bc53-4e11511b4606:5a4c8d7a-02e8-49c7-bb80-c4a7cccf7a7b:07150d36-f3c5-4408-93b4-5038acac9d5e:5924030f-5572-49b2-bf78-e02bbdf24dbc\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e150]:
                - paragraph [ref=e151]: To query the Open ($Form.Status) operations logbook entries.
                - paragraph [ref=e152]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status&pretty=true&status=Open\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e153]:
                - paragraph [ref=e154]: To query the On Hold ($Form.Status) operation logbook entries in the Operations category ($Form.Category).
                - paragraph [ref=e155]:
                  - img [ref=e156]
                  - text: The space in the On Hold state is replaced with %20 in the query.
                - paragraph [ref=e157]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Equipment.DisplayValue&pretty=true&category=Operations&status=On%20Hold\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
