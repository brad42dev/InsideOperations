            - list [ref=e173]:
              - listitem [ref=e174]:
                - paragraph [ref=e175]: To query all of the Approved rounds with a start time after 2023-06-01 00:00:00.
              - listitem [ref=e176]:
                - paragraph [ref=e177]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/operator_rounds?attribute_names=logid,Title,$Form.Area,$Form.Status,$Form.SpecificationName,$Form.Category,ScheduledStartTime,ScheduledFinishTime,RoundComment&pretty=true&status=Approved&from_date_time=2023-06-01T00:00:00Z\"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e178]:
                - paragraph [ref=e179]: To query the task data for a particular operator round (this is specified by the logid).
                - paragraph [ref=e180]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/parent-method/operator_rounds/ [logid] /get_task_measurement_export_data"
              - listitem [ref=e181]:
                - paragraph [ref=e182]: To query the list of values and their normal and valid min and max values for multiple rounds of a particular form spec name within a date range.
                - paragraph [ref=e183]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/operator_rounds?attribute_names=logid,Title,$Form.Area,$Form.Status,$Form.SpecificationName,$Form.Category,ScheduledStartTime,ScheduledFinishTime,RoundComment,[data-points]&pretty=true&from_date_time=2023-06-01T00:00:00Z&[form_spec_name]\"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
          - article [ref=e186]:
