            - generic [ref=e297]:
              - paragraph [ref=e298]:
                - text: Logbook-query-v2 in Power BI requires a different method to the logbook-query API (refer to
                - 'link "Logbook-query: REST API using Power BI" [ref=e300] [cursor=pointer]':
                  - /url: https://docs.hexagonppm.com/r/2grJVqE9SgbFe8VT3~Q__w/k0a_oUCrdnGK0AGSTkQM9A
                - text: ) due to pagination. The query needs to string together multiple pages in a single table.
              - paragraph [ref=e301]: To start, create a new blank query in Power BI. Copy the following code into the query using the advanced editor. This code fetches the data from the server, regardless of the number of pages in the result and combines them all into a single output table.
              - paragraph
              - paragraph [ref=e302]: let
              - paragraph [ref=e303]: FetchData = (url as text) as table =>
              - paragraph [ref=e304]: let
              - paragraph [ref=e305]: all_values = List.Generate(
              - paragraph [ref=e306]: "() => [items = {}, url = url],"
              - paragraph [ref=e307]: each [items] <> null,
              - paragraph [ref=e308]: each if _[url] <> null then [
              - paragraph [ref=e309]: contents = Web.Contents(_[url]),
              - paragraph [ref=e310]: json = Json.Document(contents),
              - paragraph [ref=e311]: items = json[values],
              - paragraph [ref=e312]: url = json[nextLink]
              - paragraph [ref=e313]: "] else ["
              - paragraph [ref=e314]: items = null,
              - paragraph [ref=e315]: url = null
              - paragraph [ref=e316]: "],"
              - paragraph [ref=e317]: each [items]
              - paragraph [ref=e318]: ),
              - paragraph [ref=e319]: combined = List.Combine(all_values),
              - paragraph [ref=e320]: table = Table.FromList(combined, Splitter.SplitByNothing(), null, null, ExtraValues.Error)
              - paragraph [ref=e321]: in
              - paragraph [ref=e322]: table
              - paragraph [ref=e323]: in
              - paragraph [ref=e324]: FetchData
              - paragraph
              - paragraph [ref=e325]: This query can then be called with the URL representing the logbook query that you would like.
              - paragraph [ref=e326]: You are prompted for your j5 user name and password the first time you run the query.
              - paragraph [ref=e327]:
                - img [ref=e328]
              - list [ref=e329]:
                - listitem [ref=e330]:
                  - paragraph [ref=e331]: It is not possible to get the last modified datetime for a whole IndustraForm, the function only works for a specific cell. If you want to return this information using the REST API, you need to retrieve it within the IndustraForm (as a hidden cell) and then pull that cell.
                - listitem [ref=e332]:
                  - paragraph [ref=e333]: It is not possible to get the datetime a section was submitted or the user who did the submission.
              - paragraph [ref=e334]: Example queries
              - list [ref=e335]:
                - listitem [ref=e336]:
                  - paragraph [ref=e337]: Retrieves the Permit Titles and Permit No of all the permits stored in the j5 Enterprise demo site
                  - paragraph [ref=e338]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/permits?attribute_names=Text2,PermitNo
                - listitem [ref=e339]:
                  - paragraph [ref=e340]: Returns the Permit No and the number of sections waiting for submission for all the permits in the j5 Enterprise demo site
                  - paragraph [ref=e341]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/permits?attribute_names=PermitNo,$Form.SectionsWaitingForSubmission
                - listitem [ref=e342]:
                  - paragraph [ref=e343]: As above, but limiting the number of records to 4.
                  - paragraph [ref=e344]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/permits?attribute_names=PermitNo,$Form.SectionsWaitingForSubmission&top=4
                - listitem [ref=e345]:
                  - paragraph [ref=e346]: Fetches the Status of all the Work Overview records that have a Start Time between 2019-09-01 and 2019-09-12
                  - paragraph [ref=e347]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/work_overview?attribute_names=status&prettv=true&from_date_time=2019-09-01T00:00:00Z&to_date_time=2019-09-12T00:00:00Z
