                  - generic [ref=e384]: 
            - generic [ref=e386]:
              - paragraph [ref=e387]:
                - img [ref=e388]
                - text: This function is available from
                - link "j5 Operator Rounds 28.0 update 9" [ref=e390] [cursor=pointer]:
                  - /url: javascript:;
                - text: .
              - paragraph [ref=e391]: Returns the task data for a particular operator round (specified by the logid). The results are similar to the ones you’ll get when you click Export Measurements in the Operator Rounds application on the j5 Web Client.
              - list [ref=e392]:
                - listitem [ref=e393]:
                  - paragraph [ref=e394]: "To get the logids for the operator rounds:"
                  - paragraph [ref=e395]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/operator_rounds?attribute_names=logid"
                  - paragraph [ref=e396]:
                    - img [ref=e397]
                    - text: Refer to the
                    - link "REST API" [ref=e399] [cursor=pointer]:
                      - /url: https://docs.hexagonppm.com/r/2grJVqE9SgbFe8VT3~Q__w/zH_yEtiEgaQakexIW2fx6Q
                    - text: documentation for information on how to construct a query.
                  - paragraph
                - listitem [ref=e400]:
                  - paragraph [ref=e401]: "To get a list of the measurements in each round:"
                  - paragraph [ref=e402]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/parent-method/operator_rounds/[logid]/get_task_measurement_export_data"
                  - paragraph
                  - paragraph [ref=e403]: "For example:"
                  - paragraph [ref=e404]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/parent-method/operator_rounds/ID1632218586465671916677/get_task_measurement_export_data"
                  - paragraph
                  - paragraph [ref=e405]: OR
                  - paragraph
                  - paragraph [ref=e406]: "To present an operator round's task data in an IndustraForm use the following function:"
                  - paragraph [ref=e407]: = IMPORT.LOGMETHODDATASET ("operator_rounds",BOUNDCOL("logid"),"get_task_measurement_export_data")
                  - paragraph [ref=e408]: "BOUNDCOL(\"logid\"): A section databinding that is importing Operator Rounds."
                  - paragraph
                - listitem [ref=e409]:
                  - paragraph [ref=e410]: "Example results:"
                  - paragraph [ref=e411]: "{"
                  - paragraph [ref=e412]: "\"$rowId\": \"ID1632218586465671916677-Axial_Disch_Stat\","
                  - paragraph [ref=e413]: "\"Altitude\": 38.25,"
                  - paragraph [ref=e414]: "\"AltitudeAccuracy\": 5,"
                  - paragraph [ref=e415]: "\"Comment\": null,"
                  - paragraph [ref=e416]: "\"Identifier\": \"Axial_Disch_Stat\","
                  - paragraph [ref=e417]: "\"Label\": \"Axial Comp Disch Status\","
                  - paragraph [ref=e418]: "\"LastModifiedTime\": \"2021-09-22T14:09:52Z\","
                  - paragraph [ref=e419]: "\"LastModifiedUser\": \"percy_urs\","
                  - paragraph [ref=e420]: "\"Latitude\": -33.92688730452656,"
                  - paragraph [ref=e421]: "\"LocationAccuracy\": 5,"
                  - paragraph [ref=e422]: "\"Longitude\": 18.420954665417433,"
                  - paragraph [ref=e423]: "\"NoReadingAvailable\": false,"
                  - paragraph [ref=e424]: "\"SectionBreadcrumb\": \"HydroCracker HC-1940 > Turbine Unit\","
                  - paragraph [ref=e425]: "\"Value\": \"Good\""
                  - paragraph [ref=e426]: "}"
