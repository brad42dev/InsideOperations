                  - generic [ref=e196]: 
            - generic [ref=e198]:
              - list [ref=e199]:
                - listitem [ref=e200]:
                  - paragraph [ref=e201]: To query all of the shift handovers Completed since 1 May 2023.
                  - paragraph [ref=e202]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/handover_logbook?attribute_names=$Form.Area,ShiftSummary,$Form.Status,$Form.SpecificationName,$Form.Category,$Participants.OutgoingOperator.DisplayValue,$Participants.IncomingOperator.DisplayValue&pretty=true&status=Complete&from_date_time=2023-05-01T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
                - listitem [ref=e203]:
                  - paragraph [ref=e204]: To query all of the shift handovers Not Approved since 1 January 2023 for a particular shift report IndustraForm (form_spec_name).
                  - paragraph [ref=e205]:
                    - img [ref=e206]
                    - text: Replace [form_spec_name] with the form_spec_name of the shift report IndustraForm you want to query.
                  - paragraph [ref=e207]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/handover_logbook?attribute_names=$Form.Area,ShiftSummary,$Form.Status,$Form.SpecificationName,$Form.Category,$Participants.OutgoingOperator.DisplayValue,$Participants.IncomingOperator.DisplayValue&pretty=true&=[form_spec_name]&status=Not%20Approved&from_date_time=2023-01-01T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - paragraph [ref=e208]:
                - img [ref=e209]
                - text: The RoleID in $Participants.<RoleID>.<AttributeName> should have all of the spaces removed. For example, the shift handover Incoming Operator role is noted as $Participants.IncomingOperator.DisplayValue.
          - article [ref=e212]:
            - generic [ref=e214]:
              - heading "Work Instruction examples" [level=3] [ref=e215]
              - generic [ref=e216]:
                - button "Share URL" [ref=e217] [cursor=pointer]:
                  - generic [ref=e218]: 󨃱
                - button "Print topics" [ref=e219] [cursor=pointer]:
                  - generic [ref=e220]: 
                - link "Send feedback" [ref=e221] [cursor=pointer]:
                  - /url: mailto:docs.ali@hexagon.com?subject=Feedback%20about%20%E2%80%9CWork%20Instruction%20examples%E2%80%9D%20in%20%E2%80%9Cj5%20Framework%20IndustraForm%20API%20Reference%E2%80%9D%20%5Bj5%5D%20%5BReference%5D&body=j5%20Framework%20IndustraForm%20API%20Reference%20%3E%20REST%20API%20%3E%20Parameter%20reference%20%3E%20Work%20Instruction%20examples%0A%0A%5Ben-US%5D%20%5Bj5%5D%20%5BReference%5D%20%5B2019%5D%0A%0Ahttps%3A%2F%2Fdocs.hexagonppm.com%2Fr%2Fen-US%2Fj5-Framework-IndustraForm-API-Reference%2FVersion-28.0%2F1372584%0A__________________________________________________________________________________________%0A%0A%3E%20%0A%0A%20
                  - generic [ref=e222]: 
            - list [ref=e225]:
              - listitem [ref=e226]:
                - paragraph [ref=e227]: To query all of the task values in the In Progress work instructions.
                - paragraph [ref=e228]:
                  - img [ref=e229]
                  - text: Each task has an associated set of data with it. If a work instruction has three tasks, there will be three json records returned which will all be related to the same work instruction.
                - paragraph [ref=e230]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/work_overview?attribute_names=$Form.UUID,$Form.Area,$Form.Category,$Form.Status,$Form.SpecificationName,TaskDescription.DisplayValue,TaskDone.DisplayValue,TaskDoneComment.DisplayValue&pretty=true&query_repeating=true&status=In%20Progress\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e231]:
                - paragraph [ref=e232]: To query for all of the Completed work instructions that have a scheduled start time between 1 June 2023 and 30 June 2023.
                - paragraph [ref=e233]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/work_overview?attribute_names=$Form.Area,Description,$Form.Category,$Form.Status,$Form.SpecificationName,FinishedWorkUser.DisplayValue,FinishedWorkTime&pretty=true&status=Complete&from_date_time=2023-06-01T00:00:00Z&to_date_time=2023-06-30T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e234]:
                - paragraph [ref=e235]: To query for all of the In Progress work instructions between 1 June 2023 and 30 June 2023 for a specific $Form.SpecificationName.
                - paragraph [ref=e236]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/work_overview?attribute_names=$Form.Area,Description,$Form.Category,$Form.Status,$Form.SpecificationName,FinishedWorkUser.DisplayValue,FinishedWorkTime&pretty=true&status=In%20Progress&from_date_time=2023-06-01T00:00:00Z&to_date_time=2023-06-30T00:00:00Z&[form_spec_name]=j5.WorkInstructions.work_overview-fromplan\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
          - article [ref=e239]:
            - generic [ref=e241]:
              - 'heading "Logbook-query: REST API using Power BI" [level=2] [ref=e242]'
              - generic [ref=e243]:
                - button "Share URL" [ref=e244] [cursor=pointer]:
                  - generic [ref=e245]: 󨃱
                - button "Print topics" [ref=e246] [cursor=pointer]:
                  - generic [ref=e247]: 
                - link "Send feedback" [ref=e248] [cursor=pointer]:
                  - /url: mailto:docs.ali@hexagon.com?subject=Feedback%20about%20%E2%80%9CLogbook-query%3A%20REST%20API%20using%20Power%20BI%E2%80%9D%20in%20%E2%80%9Cj5%20Framework%20IndustraForm%20API%20Reference%E2%80%9D%20%5Bj5%5D%20%5BReference%5D&body=j5%20Framework%20IndustraForm%20API%20Reference%20%3E%20REST%20API%20%3E%20Logbook-query%3A%20REST%20API%20using%20Power%20BI%0A%0A%5Ben-US%5D%20%5Bj5%5D%20%5BReference%5D%20%5B2019%5D%0A%0Ahttps%3A%2F%2Fdocs.hexagonppm.com%2Fr%2Fen-US%2Fj5-Framework-IndustraForm-API-Reference%2FVersion-28.0%2F1206228%0A__________________________________________________________________________________________%0A%0A%3E%20%0A%0A%20
                  - generic [ref=e249]: 
            - generic [ref=e251]:
              - paragraph [ref=e252]: "To process your query's data in Power BI, you'll need to return it in csv format (rather than json). To do this, create a new advanced web datasource in Power BI with the following HTTPS request header parameter:"
              - paragraph [ref=e253]: Accept text/csv
              - paragraph [ref=e254]: You are prompted for your j5 user name and password the first time you run the query.
              - paragraph [ref=e255]:
                - img [ref=e256]
              - list [ref=e257]:
                - listitem [ref=e258]:
                  - paragraph [ref=e259]: It is not possible to get the last modified datetime for a whole IndustraForm, the function only works for a specific cell. If you want to return this information using the REST API, you'll need to retrieve it within the IndustrForm (as a hidden cell) and then pull that cell.
                - listitem [ref=e260]:
                  - paragraph [ref=e261]: It is not possible to get the datetime a section was submitted or the user who did the submission.
                - listitem [ref=e262]:
                  - paragraph [ref=e263]: If you query for fields, then the API only returns data from IndustraForms that have those fields. You can use the .IsDefined syntax to check for whether fields are present, and if this is present then the data includes IndustraForms that don’t have those fields.
                - listitem [ref=e264]:
                  - paragraph [ref=e265]:
                    - text: There are no specific timeouts for this API, although the Apache load balancer times out after 5 minutes, by default. This is configurable via the j5 System Management Console, refer to
                    - link "Apache proxy timeout" [ref=e267] [cursor=pointer]:
                      - /url: javascript:;
                    - text: for details.
              - paragraph [ref=e268]: Example queries
              - list [ref=e269]:
                - listitem [ref=e270]:
                  - paragraph [ref=e271]: Retrieves the Permit Titles and Permit No of all the permits stored on the j5 Enterprise demo site.
                  - paragraph [ref=e272]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query/permits?attribute_names=Text2,PermitNo
                - listitem [ref=e273]:
                  - paragraph [ref=e274]: Returns the Permit No and the number of sections waiting for submission for all of the permits on the j5 Enterprise demo site.
                  - paragraph [ref=e275]: https://[j5 Server URL]/restserver/28.0/industraform/logbook-query/permits?attribute_names=PermitNo,$Form.SectionsWaitingForSubmission
                - listitem [ref=e276]:
                  - paragraph [ref=e277]: As above, but limiting the number of records to 4.
