              - paragraph [ref=e212]:
                - img [ref=e213]
                - text: cURL isn't provided by j5. It's an external tool used to make calls to URLs. The examples in this book are for basic scenarios with one authentication method, and with no customizations to j5.
              - paragraph [ref=e214]: The URL for accessing the method is http(s)://<j5server[:port]>/restserver/<j5_version>/industraform/logbook-query (or logbook-query-v2)/<logbook_name>. Please use the HTTP GET method and the HTTP Basic Authentication to provide credentials. The logbook name parameter is included in the URL, and all of the other parameters are provided as URL query components.
              - paragraph [ref=e215]: When filtering by time, the REST API filters against the primary_time_field, which varies from logbook to logbook. It defaults to start_time in Ops Bundle and valid_start in CoW. It can be overidden in the logbook.yml, but each logbook can only be filtered by one time field.
              - paragraph [ref=e216]: There is also a set of attributes that give information about an IndustraForm instance as a whole. They are queried using the attribute name "$Form.<FormAttribute>".
              - paragraph [ref=e217]: If the data for an attribute is stored as a code/hash in the database, and is displayed differently in the user interface, you can retrieve the user interface version by using DisplayValue.
