            - list [ref=e1127]:
              - listitem [ref=e1128]:
                - paragraph [ref=e1129]: To query all of the permits Completed between 1 and 30 June 2023.
                - paragraph [ref=e1130]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/cow_permits?attribute_names=$Form.Area,Description,$Form.Category,$Form.Status,PermitNo,start_date,end_date&pretty=true&from_date_time=2023-06-01T00:00:00Z&to_date_time=2023-06-30T00:00:00Z&status=Complete\"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1131]:
                - paragraph [ref=e1132]: To query all of the permits in the Drafting state, along with the usernames assigned to the roles.
                - paragraph [ref=e1133]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/cow_permits?attribute_names=$Form.Area,Description,$Form.Category,$Form.Status,$Participants.AreaAuthority,$Participants.IssuingAuthority,$Participants.PerformingAuthority,PermitNo,start_date,end_date&pretty=true&status=Drafting\"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1134]:
                - paragraph [ref=e1135]: To query all of the certificates that have been modified since midnight on 1 August 2023.
                - paragraph [ref=e1136]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/cow_certificates?attribute_names=$Form.Area,Description,$Form.Category,$Form.Status,$Participants.IssuingAuthority,$Participants.PerformingAuthority,CertificateNo,PermitNo,last_modification&pretty=true&last_modified=2023-08-01T00:00:00Z\" -H \"authorization: Basic [Encoded username and password]\""
