              - list [ref=e1258]:
                - listitem [ref=e1259]:
                  - paragraph [ref=e1260]: To query all of the shift handovers Completed since 1 May 2023.
                  - paragraph [ref=e1261]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/handover_logbook?attribute_names=$Form.Area,ShiftSummary,$Form.Status,$Form.SpecificationName,$Form.Category,$Participants.OutgoingOperator.DisplayValue,$Participants.IncomingOperator.DisplayValue&pretty=true&status=Complete&from_date_time=2023-05-01T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
                - listitem [ref=e1262]:
                  - paragraph [ref=e1263]: To query all of the shift handovers Not Approved since 1 January 2023 for a particular shift report IndustraForm (form_spec_name).
                  - paragraph [ref=e1264]:
                    - img [ref=e1265]
                    - text: Replace [form_spec_name] with the form_spec_name of the shift report IndustraForm you want to query.
                  - paragraph [ref=e1266]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/handover_logbook?attribute_names=$Form.Area,ShiftSummary,$Form.Status,$Form.SpecificationName,$Form.Category,$Participants.OutgoingOperator.DisplayValue,$Participants.IncomingOperator.DisplayValue&pretty=true&=[form_spec_name]&status=Not%20Approved&from_date_time=2023-01-01T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - paragraph [ref=e1267]:
                - img [ref=e1268]
                - text: The RoleID in $Participants.<RoleID>.<AttributeName> should have all of the spaces removed. For example, the shift handover Incoming Operator role is noted as $Participants.IncomingOperator.DisplayValue.