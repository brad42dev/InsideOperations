                  - generic [ref=e1190]: 
            - list [ref=e1193]:
              - listitem [ref=e1194]:
                - paragraph [ref=e1195]: To query the operations logbook entries with an event time between 1 June 2023 00:00:00 and 30 June 2023 00:00:00.
                - paragraph [ref=e1196]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status&pretty=true&from_date_time=2023-06-01T00:00:00Z&to_date_time=2023-06-30T00:00:00Z\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1197]:
                - paragraph [ref=e1198]: To query the operations logbook entries with a $Form.Area that matches the specified area path.
                - paragraph [ref=e1199]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Priority,CreatedByUser.DisplayValue&pretty=true&area=[area path]\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
                - paragraph [ref=e1200]:
                  - img [ref=e1201]
                - list [ref=e1202]:
                  - listitem [ref=e1203]:
                    - paragraph [ref=e1204]: To find the area path, run the same query but without the "&area=…" and refer to the $Form.Area for the relevant fields.
                  - listitem [ref=e1205]:
                    - paragraph [ref=e1206]: Replace [area path] with your area path.
                - paragraph [ref=e1207]: "For example:"
                - paragraph [ref=e1208]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Priority,CreatedByUser.DisplayValue&pretty=true&area=9a138aad-a5f3-493d-bc53-4e11511b4606:5a4c8d7a-02e8-49c7-bb80-c4a7cccf7a7b:07150d36-f3c5-4408-93b4-5038acac9d5e:5924030f-5572-49b2-bf78-e02bbdf24dbc\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1209]:
                - paragraph [ref=e1210]: To query the Open ($Form.Status) operations logbook entries.
                - paragraph [ref=e1211]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status&pretty=true&status=Open\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1212]:
                - paragraph [ref=e1213]: To query the On Hold ($Form.Status) operation logbook entries in the Operations category ($Form.Category).
                - paragraph [ref=e1214]:
                  - img [ref=e1215]
                  - text: The space in the On Hold state is replaced with %20 in the query.
                - paragraph [ref=e1216]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/general_logbook?attribute_names=$Form.Area,Message,$Form.Category,EventTime,$Form.Status,Equipment.DisplayValue&pretty=true&category=Operations&status=On%20Hold\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
