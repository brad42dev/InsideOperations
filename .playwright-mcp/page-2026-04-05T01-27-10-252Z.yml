                - paragraph [ref=e1236]: "curl -X GET \"https://[j5 Server URL]/restserver/28.0/industraform/logbook-query-v2/operator_rounds?attribute_names=logid,Title,$Form.Area,$Form.Status,$Form.SpecificationName,$Form.Category,ScheduledStartTime,ScheduledFinishTime,RoundComment&pretty=true&status=Approved&from_date_time=2023-06-01T00:00:00Z\"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - listitem [ref=e1237]:
