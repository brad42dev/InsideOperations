                  - generic [ref=e816]: 
            - generic [ref=e818]:
              - paragraph [ref=e819]: The API call produces a JSON object that has several properties. Firstly, the values property contains an array of objects. Each object has a property for each of the requested attribute names.
              - paragraph [ref=e820]: "Additionally, there is a second property in the root object called nextLink that is used for pagination. Some queries are too big to be efficiently returned on a single page. When a page does not contain all of the required results, the nextLink property contains a string which is the URL that must be called to get the next page. If no more pages are required, the nextLink property contains `null`."
              - paragraph [ref=e821]:
                - img [ref=e822]
              - list [ref=e823]:
                - listitem [ref=e824]:
                  - paragraph [ref=e825]: A query is sometimes split over several pages.
                - listitem [ref=e826]:
                  - paragraph [ref=e827]: There is no specific order guarantee for results. The first available results are returned first.
          - article [ref=e828]:
