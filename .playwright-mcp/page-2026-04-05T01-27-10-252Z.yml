            - generic [ref=e153]:
              - paragraph [ref=e154]: IndustraForm entries are always linked to a logbook form entry. The IndustraForm REST API provides a method to query a logbook for data in associated IndustraForm entries over HTTP.
              - paragraph [ref=e155]: The logbook-query and logbook-query-v2 methods provide a logbook name, a list of attribute names, and optionally, date/time or area filters. It returns a list of results with the values of the requested attributes for their matching entries.
              - paragraph [ref=e156]: The logbook-query method can return a maximum number of 1000 results, while the logbook-query-v2 method can return any number of results.
              - paragraph [ref=e157]: Logbook-query example
              - paragraph [ref=e158]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/logbook-query/linked_industraforms_eg
              - paragraph [ref=e159]: "?attribute_names=EntryNumber,ResponsiblePerson,Priority,StartedTime,DueDate,EstimatedDuration,"
              - paragraph [ref=e160]: "EstimatedEndDate&pretty=true\" -H \"accept: application/json\" -H"
