          - generic [ref=e113]:
            - paragraph [ref=e114]: "j5 IndustraForms are smart and flexible forms that can be designed to specifically meet your needs. This document describes the two parts of the IndustraForm API:"
            - list [ref=e115]:
              - listitem [ref=e116]:
                - paragraph [ref=e117]: A REST API that can be accessed over HTTP from any programming language giving access to information recorded in IndustraForms.
              - listitem [ref=e118]:
                - paragraph [ref=e119]: An in-process Python API that is available to j5 developers and trained system integrators to integrate IndustraForms with new and existing j5 applications.
            - paragraph [ref=e120]:
              - img [ref=e121]
            - list [ref=e122]:
              - listitem [ref=e123]:
                - paragraph [ref=e124]: Our commitment to maintaining API, configuration, and database schema backwards compatibility for IndustraForms is limited to content that is mentioned specifically in this document. If you are unsure of what is supported, please contact your support representative for clarification.
              - listitem [ref=e125]:
                - paragraph [ref=e126]:
                  - text: When APIs or Web Services are not available, direct calls to the database can be performed, see
