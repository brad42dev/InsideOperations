            - generic [ref=e767]:
              - paragraph [ref=e768]: "If a form has roles defined for it, you can to find information about the users that have been assigned to those roles (the participants). This information is queried using an attribute name like \"$Participants.<RoleID>.<AttributeName>\". Any of the element attributes can be referenced for participants (Value, DisplayValue, IsDefined, IsValid, IsError or Error). Here is an example of where all of the $Participants attributes are queried for a particular role:"
