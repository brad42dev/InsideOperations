                  - /url: mailto:docs.ali@hexagon.com?subject=Feedback%20about%20%E2%80%9CQuery%20repeating%20sections%E2%80%9D%20in%20%E2%80%9Cj5%20Framework%20IndustraForm%20API%20Reference%E2%80%9D%20%5Bj5%5D%20%5BReference%5D&body=j5%20Framework%20IndustraForm%20API%20Reference%20%3E%20REST%20API%20%3E%20Query%20repeating%20sections%0A%0A%5Ben-US%5D%20%5Bj5%5D%20%5BReference%5D%20%5B2019%5D%0A%0Ahttps%3A%2F%2Fdocs.hexagonppm.com%2Fr%2Fen-US%2Fj5-Framework-IndustraForm-API-Reference%2FVersion-28.0%2F1374304%0A__________________________________________________________________________________________%0A%0A%3E%20%0A%0A%20
                  - generic [ref=e838]: 
            - generic [ref=e840]:
              - paragraph [ref=e841]: "IndustraForm designs can contain repeating sections. If you would like to retrieve information from a repeating section, you must:"
              - list [ref=e842]:
                - listitem [ref=e843]:
                  - paragraph [ref=e844]: Include attribute names for elements in the repeating section.
                - listitem [ref=e845]:
                  - paragraph [ref=e846]: Send the query_repeating parameter with a value of true.
              - paragraph [ref=e847]: In this case, a separate result row is sent back for each repeat. This behaves in a similar way to an INNER JOIN SQL query, where there is a row for each repeat, and where elements that are outside of the repeating section are duplicated in to each row.
              - paragraph [ref=e848]: In addition, $Form and $Participant attributes are duplicated in to each row.
              - paragraph [ref=e849]: curl -X GET "https://[j5 Server URL]/restserver/28.0/industraform/logbook-query/linked_industraforms_eg
              - paragraph [ref=e850]: "?attribute_names=$Form.UUID,ResponsiblePerson.DisplayValue,TankName,TankLevel,TankOk"
              - paragraph [ref=e851]: "&query_repeating=true\" -H \"accept: text/csv\" -H \"authorization: Basic [Encoded username and password]\""
              - paragraph
              - paragraph [ref=e852]: $Form.UUID,ResponsiblePerson.DisplayValue,TankName,TankLevel,TankOk
              - paragraph [ref=e853]: 92ce3535-47d5-4d59-b32d-fbb9ee0e64cf,John Smith,T242,75.0,true
