              - paragraph [ref=e245]: The most common query attribute names are simply the names of elements in an IndustraForm design. The attributes in the previous example are all element value attributes.
              - paragraph [ref=e246]: "The JSON datatype returned for the value of each element depends on the element type, but can be one of the following:"
              - list [ref=e247]:
                - listitem [ref=e248]:
                  - paragraph [ref=e249]: "null"
                - listitem [ref=e250]:
                  - paragraph [ref=e251]: Number
                - listitem [ref=e252]:
                  - paragraph [ref=e253]: Boolean
                - listitem [ref=e254]:
                  - paragraph [ref=e255]: String
              - paragraph [ref=e256]: Date and Date&Time elements return String values, after converting the value to UTC and formatting according to RFC3339. For example, "2017-07-03" and "2017-06-30T10:23:59Z".
              - paragraph [ref=e257]: Checklist Item elements generally have a Boolean value, but may return the String "NOT_APPLICABLE" if the user has selected that value.
              - paragraph [ref=e258]: In addition to finding out the value of the element, it is also possible to query other attributes of the element. An alternative element attribute is queried using the attribute name "<ElementName>.<Attribute>". For example, querying for
              - paragraph [ref=e259]: "\"ResponsiblePerson.DisplayValue\" returns the user’s full name (this is displayed in the j5 UI) rather than their user name (the underlying value)."
