          - generic [ref=e833]:
            - generic [ref=e834]:
              - generic [ref=e835]: Live Trend
              - generic [ref=e836]: Standard
              - generic [ref=e837]: Live
            - paragraph [ref=e838]: Auto-scrolling real-time trend showing current point values as they arrive. The chart continuously appends new data and scrolls left, discarding data that falls off the trailing edge. Up to 12 pens on a single axis let operators compare related variables side by side.
        - generic [ref=e839]:
          - generic [ref=e840]:
            - generic [ref=e841]: Benefits
            - list [ref=e842]:
              - listitem [ref=e843]: Always shows right now — no manual refresh
              - listitem [ref=e844]: Up to 12 pens — compare related variables on one axis
              - listitem [ref=e845]: Lookback window configurable from 1 minute to hours
              - listitem [ref=e846]: Sub-second live updates direct from the OPC pipeline
          - generic [ref=e847]:
            - generic [ref=e848]: Limitations
            - list [ref=e849]:
              - listitem [ref=e850]: Cannot review the past beyond the lookback window
              - listitem [ref=e851]: Not useful for deep historical analysis
        - generic [ref=e852]:
          - generic [ref=e853]: Usage
          - paragraph [ref=e854]: "Assign related process variables in the Data Points tab — inlet temperature, outlet temperature, and setpoint together; or feed flow, product flow, and recycle flow together. Set the toolbar duration to match your monitoring horizon: 1–2 hours suits most active operator tasks; 8–12 hours gives shift-level context. When a process upset is developing, shrink the duration to 5–15 minutes so the fast dynamics fill the chart and you can read the sequence of events clearly. Use the Scaling tab to set engineering-unit ranges per pen; auto-scale works for a first look but fixed ranges let you compare the same pane across shifts without the Y-axis jumping."
        - generic [ref=e855]:
          - generic [ref=e856]: Real-World Scenarios
          - generic [ref=e857]:
            - generic [ref=e858]:
              - generic [ref=e859]: Operator
              - generic [ref=e860]: HCU Quench Hydrogen Early Warning
            - paragraph [ref=e861]: Watch quench H₂ flow, bed-3 outlet temperature, and reactor differential pressure together on a 15-minute window during a rate increase. A rising bed temperature that outpaces quench response gives 3–5 minutes of warning before the high-temperature alarm fires — enough time to bring the quench controller into manual and add flow before the trip interlock activates.
          - generic [ref=e862]:
            - generic [ref=e863]:
              - generic [ref=e864]: Controls Engineer
              - generic [ref=e865]: Anti-Surge Controller Tuning — Live Response
            - paragraph [ref=e866]: Monitor recycle compressor suction flow, suction pressure, and shaft speed on a 10-minute live trend during a planned rate change. Watching the operating point relative to the surge boundary in real time lets you tune the anti-surge setpoint without triggering an actual surge event — one surge can mechanically damage the impeller and costs more to repair than the tuning session.
          - generic [ref=e867]:
            - generic [ref=e868]:
              - generic [ref=e869]: Reliability Engineer
              - generic [ref=e870]: Pump Vibration on Seal-Replacement Restart
            - paragraph [ref=e871]: During the restart of a crude charge pump after a seal change, watch drive-end vibration, non-drive-end vibration, and bearing temperature on a 5-minute window. Any vibration spike above 4 mm/s that does not self-attenuate within 90 seconds means the seal is misaligned — stop the pump immediately rather than run it to failure.
          - generic [ref=e872]:
            - generic [ref=e873]:
              - generic [ref=e874]: Marketing / Trading
              - generic [ref=e875]: Blending Component Qualities During Gasoline Blend
            - paragraph [ref=e876]: Track reformate RON, alkylate RVP, and FCCU naphtha sulfur from the online analyzers on a live trend during an active gasoline blend operation. When a component quality swings outside the blending recipe tolerance, the trader or blending coordinator can call for a blend ratio adjustment before the final product sample is taken — avoiding a tank downgrade that costs several dollars per barrel on a 50,000-barrel parcel.
