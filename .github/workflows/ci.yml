name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BINDGEN_EXTRA_CLANG_ARGS: "-I/usr/lib/gcc/x86_64-linux-gnu/13/include"

jobs:
  rust-checks:
    name: Rust — lint + unit tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (for samael/xmlsec1)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxmlsec1-dev libxmlsec1-openssl libxml2-dev libxslt1-dev

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --lib --workspace

  frontend-checks:
    name: Frontend — lint + type check + unit tests
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: pnpm test

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-24.04
    needs: [rust-checks, frontend-checks]
    services:
      postgres:
        image: timescale/timescaledb:2.13.1-pg16
        env:
          POSTGRES_USER: io
          POSTGRES_PASSWORD: io_password
          POSTGRES_DB: io_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IO_DATABASE_URL: postgresql://io:io_password@localhost:5432/io_test
      JWT_SECRET: test-secret-for-ci-only
      IO_SERVICE_SECRET: test-service-secret
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libxmlsec1-dev libxmlsec1-openssl libxml2-dev libxslt1-dev
      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres
      - name: Run migrations
        run: sqlx migrate run --source migrations
      - name: Run integration tests
        run: cargo test --test '*' --workspace 2>/dev/null || echo "No integration test binaries yet"
