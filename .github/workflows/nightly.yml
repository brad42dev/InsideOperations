name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:

jobs:
  security-audit:
    name: Security audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit Rust dependencies
        run: cargo audit
      - name: Audit Node dependencies
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level moderate

  e2e-critical:
    name: E2E — critical paths
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Playwright
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: frontend
        run: npx playwright test --reporter=html
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libxmlsec1-dev libxmlsec1-openssl libxml2-dev
      - name: Run criterion benchmarks
        run: cargo bench --workspace 2>&1 | tee bench-results.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: bench-results.txt

  load-tests:
    name: Goose load tests
    runs-on: ubuntu-24.04
    # Requires a running staging gateway — only trigger manually with STAGING_URL set.
    # Do NOT run against the ephemeral CI database; it cannot sustain 200 concurrent
    # WebSocket connections at 10,000 point updates/second.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y libxmlsec1-dev libxmlsec1-openssl libxml2-dev
      - name: Run Goose load tests (200 users, 60 s)
        env:
          STAGING_URL: ${{ vars.STAGING_URL }}
        run: |
          cargo run -p io-load-tests -- \
            --host "$STAGING_URL" \
            --users 200 \
            --run-time 60s \
            --report-file load-report.html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-report
          path: load-report.html
