version: "3.9"

# Development environment: PostgreSQL 16 + TimescaleDB
# Server 1 (Build/Test) only — Server 2 uses native PostgreSQL install

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: io_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: io_dev
      POSTGRES_USER: io
      POSTGRES_PASSWORD: io_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - io_pgdata:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U io -d io_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  video-export-service:
    build:
      context: .
      dockerfile: services/video-export-service/Dockerfile
    ports:
      - "3011:3011"
    environment:
      IO_DATABASE_URL: postgresql://io:io_password@db:5432/io_dev
      IO_EXPORT_DIR: /data/exports
      IO_JWT_SECRET: ${IO_JWT_SECRET}
      FRONTEND_BASE_URL: http://host.docker.internal:5173
      VIDEO_EXPORT_SERVICE_PORT: "3011"
    volumes:
      - io_exports:/data/exports
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - db

volumes:
  io_pgdata:
    name: io-dev_io-pgdata
    external: true
  io_exports:

networks:
  default:
    name: io_dev_network
