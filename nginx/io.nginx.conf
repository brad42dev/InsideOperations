# Inside/Operations — nginx site configuration
# Listens on 443 (HTTPS) and redirects 80 → 443.
# Serves the built frontend from __SERVE_DIR__ and proxies
# API + WebSocket traffic to the local Rust services.
#
# Placeholder tokens replaced by install.sh at install time:
#   __SERVER_HOST__   Hostname or IP for the server_name directive
#   __SERVE_DIR__     Absolute path to the built frontend (e.g. /opt/io/frontend)
#   __TLS_CERT__      Absolute path to the TLS certificate file
#   __TLS_KEY__       Absolute path to the TLS private key file
#
# TLS certificates:
#   Self-signed (dev/LAN):  /etc/io/tls/self-signed.crt + .key
#   Let's Encrypt (prod):   /etc/letsencrypt/live/<domain>/fullchain.pem + privkey.pem

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_HOST__;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name __SERVER_HOST__;

    # TLS — tokens replaced by install.sh
    ssl_certificate     __TLS_CERT__;
    ssl_certificate_key __TLS_KEY__;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-Frame-Options            "DENY"                                           always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"                always;
    add_header X-Permitted-Cross-Domain-Policies "none"                                    always;
    # CSP: self-origin only; wasm-unsafe-eval for uPlot/ECharts WASM; unsafe-inline for
    # Tailwind-generated styles injected at runtime; data: for SVG icons; blob: for tile images.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' wss://$host ws://$host; worker-src 'self' blob:; frame-ancestors 'none'"
        always;
    # Restrict browser feature access — IO has no need for camera, mic, etc.
    add_header Permissions-Policy
        "geolocation=(), microphone=(), camera=(), accelerometer=(), gyroscope=(), magnetometer=(), payment=(), usb=()"
        always;
    # Hide nginx version
    server_tokens off;

    # ── Frontend static files ─────────────────────────────────────────────────
    root  __SERVE_DIR__;
    index index.html;

    # Aggressive caching for hashed assets (Vite adds content hash to filenames)
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Tile pyramids served directly from disk (no gateway round-trip)
    location /tiles/ {
        alias /opt/io/tiles/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ── API Gateway proxy ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Allow larger uploads (SVG imports, bulk update files)
        client_max_body_size 50m;
    }

    # ── WebSocket proxy (data-broker) ─────────────────────────────────────────
    location /ws {
        proxy_pass          http://127.0.0.1:3001/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        # Long timeouts — WebSocket connections are persistent
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Health check pass-through (used by load balancers / uptime monitors) ──
    location /health/ {
        proxy_pass       http://127.0.0.1:3000/health/;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── SPA fallback — all other paths serve index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
