<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="tank-storage-dome-roof"
     data-io-version="2"
     data-io-category="tanks"
     viewBox="0 0 70 70">
  <g class="io-shape-body">
    <!-- Tank body (closed path — used as FillGauge clip path) -->
    <path d="M10,20 L60,20 L60,60 L10,60 Z" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Dome roof arc (apex at y=10, 10 units above shell top) -->
    <path d="M10,20 A25,10 0 0,1 60,20" fill="none" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="8" cy="40"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="62" cy="40"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="35" cy="8"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="35" cy="62"/>
  </g>
  <g class="io-shape-part-support"></g>
</svg>
