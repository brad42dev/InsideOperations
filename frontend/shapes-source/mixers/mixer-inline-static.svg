<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="mixer-inline-static"
     data-io-version="2"
     data-io-category="mixers"
     viewBox="0 0 70 30">
  <g class="io-shape-body">
    <!-- Mixer body -->
    <rect x="10" y="5" width="50" height="20" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Static mixing element (zigzag) -->
    <polyline points="10,5 16,25 22,5 28,25 34,5 40,25 46,5 52,25 58,5 60,15" fill="none" stroke="#808080" stroke-width="0.75"/>
    <!-- Left pipe stub -->
    <line x1="2" y1="15" x2="10" y2="15" stroke="#808080" stroke-width="1.5"/>
    <!-- Right pipe stub -->
    <line x1="60" y1="15" x2="68" y2="15" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="0" cy="15"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="70" cy="15"/>
  </g>
</svg>
