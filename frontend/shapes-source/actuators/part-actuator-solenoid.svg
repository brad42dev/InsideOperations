<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="part-actuator-solenoid"
     data-io-version="2"
     data-io-category="actuators"
     viewBox="0 0 30 30">
  <g class="io-shape-body">
    <!-- Solenoid body (hydraulic actuator) — taller rect -->
    <rect x="7" y="5" width="16" height="18" fill="none" stroke="#808080" stroke-width="1.5"/>
    <text x="15" y="14" text-anchor="middle" dominant-baseline="central" font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700" fill="#808080">H</text>
    <!-- Stem — connects to valve below -->
    <line x1="15" y1="23" x2="15" y2="28" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <!-- Stem tip — attachment point to valve -->
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-stem" cx="15" cy="30"/>
  </g>
</svg>
