<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="support-saddles"
     data-io-version="2"
     data-io-category="supports"
     viewBox="0 0 80 14">
  <g class="io-shape-body">
    <!-- Left saddle bracket -->
    <line x1="20" y1="2" x2="17" y2="12" stroke="#808080" stroke-width="1.5"/>
    <line x1="24" y1="2" x2="24" y2="12" stroke="#808080" stroke-width="1.5"/>
    <!-- Left saddle foot -->
    <line x1="17" y1="12" x2="24" y2="12" stroke="#808080" stroke-width="0.75"/>
    <!-- Right saddle bracket -->
    <line x1="56" y1="2" x2="53" y2="12" stroke="#808080" stroke-width="1.5"/>
    <line x1="60" y1="2" x2="60" y2="12" stroke="#808080" stroke-width="1.5"/>
    <!-- Right saddle foot -->
    <line x1="53" y1="12" x2="60" y2="12" stroke="#808080" stroke-width="0.75"/>
  </g>
  <g class="io-connections" display="none">
    <!-- Attachment to horizontal vessel bottom — centered between saddle attachment points, 2 units above geometry start at y=2 -->
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="40" cy="0"/>
  </g>
</svg>
