<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="vessel-horizontal-flanged-both"
     data-io-version="2"
     data-io-category="vessels"
     viewBox="0 0 80 40">
  <g class="io-shape-body">
    <!-- Left elliptical head (welded) -->
    <path d="M12,10 A5,10 0 0,0 12,30" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Flanged left flange line -->
    <line x1="12" y1="8" x2="12" y2="32" stroke="#808080" stroke-width="1.5"/>
    <!-- Shell walls -->
    <line x1="12" y1="10" x2="68" y2="10" stroke="#808080" stroke-width="1.5"/>
    <line x1="12" y1="30" x2="68" y2="30" stroke="#808080" stroke-width="1.5"/>
    <!-- Right elliptical head (welded) -->
    <path d="M68,10 A5,10 0 0,1 68,30" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Flanged right flange line -->
    <line x1="68" y1="8" x2="68" y2="32" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="7" cy="20"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="73" cy="20"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="40" cy="8"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="40" cy="32"/>
  </g>
  <g class="io-shape-part-support"></g>
</svg>
