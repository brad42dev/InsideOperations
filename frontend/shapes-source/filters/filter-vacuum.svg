<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="filter-vacuum"
     data-io-version="2"
     data-io-category="filters"
     viewBox="0 0 66 55">
  <g class="io-shape-body">
    <!-- Drum arc (top) -->
    <path d="M17,10 A16,4 0 0,1 49,10" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Left drum wall -->
    <line x1="17" y1="10" x2="17" y2="20" stroke="#808080" stroke-width="1.5"/>
    <!-- Right drum wall -->
    <line x1="49" y1="10" x2="49" y2="20" stroke="#808080" stroke-width="1.5"/>
    <!-- Left horizontal ledge -->
    <line x1="9" y1="20" x2="17" y2="20" stroke="#808080" stroke-width="1.5"/>
    <!-- Right horizontal ledge -->
    <line x1="49" y1="20" x2="57" y2="20" stroke="#808080" stroke-width="1.5"/>
    <!-- Outer V cone -->
    <polyline points="9,20 33,44 57,20" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Inner V cone -->
    <polyline points="17,20 33,36 49,20" fill="none" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="33" cy="4"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="7" cy="20"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="59" cy="20"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="33" cy="46"/>
  </g>
</svg>
