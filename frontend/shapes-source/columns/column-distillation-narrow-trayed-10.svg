    <!-- Left wall -->
    <line x1="12" y1="10" x2="12" y2="110" stroke="#808080" stroke-width="1.5"/>
    <!-- Right wall -->
    <line x1="28" y1="10" x2="28" y2="110" stroke="#808080" stroke-width="1.5"/>
    <!-- Domed bottom (apex at y=115) -->
    <path d="M12,110 A8,5 0 0,0 28,110" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Tray lines (10 trays) -->
    <line x1="12" y1="19" x2="28" y2="19" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="28" x2="28" y2="28" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="37" x2="28" y2="37" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="46" x2="28" y2="46" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="55" x2="28" y2="55" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="64" x2="28" y2="64" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="73" x2="28" y2="73" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="82" x2="28" y2="82" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="91" x2="28" y2="91" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="100" x2="28" y2="100" stroke="#808080" stroke-width="0.75"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="20" cy="3"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="10" cy="60"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="30" cy="60"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="20" cy="117"/>
  </g>
  <g class="io-shape-part-support"></g>
