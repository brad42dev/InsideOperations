<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="column-distillation-narrow-packed"
     data-io-version="2"
     data-io-category="columns"
     viewBox="0 0 40 120">
  <g class="io-shape-body">
    <!-- Domed top (apex at y=5) -->
    <path d="M12,10 A8,5 0 0,1 28,10" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Left wall -->
    <line x1="12" y1="10" x2="12" y2="110" stroke="#808080" stroke-width="1.5"/>
    <!-- Right wall -->
    <line x1="28" y1="10" x2="28" y2="110" stroke="#808080" stroke-width="1.5"/>
    <!-- Domed bottom (apex at y=115) -->
    <path d="M12,110 A8,5 0 0,0 28,110" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Section 1: y=18 to y=55 -->
    <line x1="12" y1="18" x2="28" y2="18" stroke="#808080" stroke-width="0.75"/>
    <polyline points="12,22 20,30 12,38" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="28,22 20,30 28,38" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="12,38 20,46 12,54" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="28,38 20,46 28,54" fill="none" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="55" x2="28" y2="55" stroke="#808080" stroke-width="0.75"/>
    <!-- Section 2: y=60 to y=100 -->
    <line x1="12" y1="60" x2="28" y2="60" stroke="#808080" stroke-width="0.75"/>
    <polyline points="12,64 20,72 12,80" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="28,64 20,72 28,80" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="12,80 20,88 12,96" fill="none" stroke="#808080" stroke-width="0.75"/>
    <polyline points="28,80 20,88 28,96" fill="none" stroke="#808080" stroke-width="0.75"/>
    <line x1="12" y1="100" x2="28" y2="100" stroke="#808080" stroke-width="0.75"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="20" cy="3"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="10" cy="60"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="30" cy="60"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="20" cy="117"/>
  </g>
  <g class="io-shape-part-support"></g>
</svg>
