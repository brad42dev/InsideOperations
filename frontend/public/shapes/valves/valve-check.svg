<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="valves" data-name="Check Valve">
    <!-- Left triangle (body, flow direction right) -->
    <polygon points="15,20 55,50 15,80" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Vertical stop line (seat) -->
    <line x1="55" y1="20" x2="55" y2="80" stroke="#8a8a8a" stroke-width="2.5"/>
    <!-- Flow direction arrow -->
    <line x1="60" y1="50" x2="82" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="85,50 78,45 78,55" fill="#8a8a8a"/>
    <!-- Flow lines -->
    <line x1="0" y1="50" x2="15" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="85" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
