<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="valves" data-name="Gate Valve">
    <!-- Two filled triangles meeting at center -->
    <polygon points="10,20 50,50 10,80" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="90,20 50,50 90,80" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem line -->
    <line x1="50" y1="50" x2="50" y2="15" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Actuator box placeholder -->
    <rect x="40" y="5" width="20" height="10" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flow lines -->
    <line x1="0" y1="50" x2="10" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="90" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
