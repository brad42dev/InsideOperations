<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="valves" data-name="Butterfly Valve">
    <!-- Valve body circle -->
    <circle cx="50" cy="50" r="28" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Disc line (diagonal, indicating throttling position) -->
    <line x1="32" y1="30" x2="68" y2="70" stroke="#8a8a8a" stroke-width="3"/>
    <!-- Stem line -->
    <line x1="50" y1="22" x2="50" y2="10" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem indicator circle -->
    <circle cx="50" cy="8" r="4" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flow lines -->
    <line x1="0" y1="50" x2="22" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="78" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
