<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="valves" data-name="Globe Valve">
    <!-- Two triangles meeting at center -->
    <polygon points="12,22 50,50 12,78" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="88,22 50,50 88,78" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Globe body: circle at center -->
    <circle cx="50" cy="50" r="14" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem line -->
    <line x1="50" y1="36" x2="50" y2="15" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Actuator box -->
    <rect x="40" y="5" width="20" height="10" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flow lines -->
    <line x1="0" y1="50" x2="12" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="88" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
