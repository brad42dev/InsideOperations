<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="valves" data-name="Control Valve">
    <!-- Two triangles meeting at center (ISA control valve body) -->
    <polygon points="10,20 50,50 10,80" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="90,20 50,50 90,80" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem line -->
    <line x1="50" y1="50" x2="50" y2="22" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Diaphragm actuator (circle on top of stem) -->
    <ellipse cx="50" cy="14" rx="14" ry="8" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Arrow on actuator indicating throttling/modulating -->
    <line x1="50" y1="6" x2="50" y2="2" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="50,0 47,4 53,4" fill="#8a8a8a"/>
    <!-- Flow lines -->
    <line x1="0" y1="50" x2="10" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="90" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
