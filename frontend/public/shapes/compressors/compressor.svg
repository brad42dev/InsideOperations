<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="compressors" data-name="Compressor">
    <!-- Casing circle (ISA centrifugal compressor) -->
    <circle cx="50" cy="55" r="30" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Back-to-back triangles (bilateral, indicating compression both sides) -->
    <polygon points="30,55 50,40 50,70" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <polygon points="70,55 50,40 50,70" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Inlet nozzle left -->
    <line x1="0" y1="55" x2="20" y2="55" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle top -->
    <line x1="50" y1="25" x2="50" y2="5" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Driver shaft right -->
    <line x1="80" y1="55" x2="100" y2="55" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
