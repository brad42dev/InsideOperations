<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="parts" data-name="Diaphragm Actuator">
    <!-- Actuator housing (triangle pointing down — diaphragm body) -->
    <polygon points="20,15 80,15 50,55" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Diaphragm line across top of triangle -->
    <line x1="20" y1="15" x2="80" y2="15" stroke="#8a8a8a" stroke-width="3"/>
    <!-- Stem line from apex downward -->
    <line x1="50" y1="55" x2="50" y2="80" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem tip circle (connection to valve) -->
    <circle cx="50" cy="84" r="5" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Spring inside (coil lines) -->
    <line x1="38" y1="28" x2="62" y2="28" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Signal connection top -->
    <line x1="50" y1="15" x2="50" y2="3" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
