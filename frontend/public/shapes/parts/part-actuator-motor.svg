<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="parts" data-name="Motor Actuator">
    <!-- Motor actuator body rectangle -->
    <rect x="25" y="20" width="50" height="40" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- M letter inside -->
    <text x="50" y="46" text-anchor="middle" font-size="20" font-weight="bold"
          fill="#8a8a8a" font-family="sans-serif">M</text>
    <!-- Stem line from bottom center -->
    <line x1="50" y1="60" x2="50" y2="80" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Stem tip circle -->
    <circle cx="50" cy="84" r="5" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Power connection top -->
    <line x1="50" y1="20" x2="50" y2="8" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Conduit box top -->
    <rect x="43" y="5" width="14" height="8" fill="white" stroke="#8a8a8a" stroke-width="1.5"/>
  </g>
</svg>
