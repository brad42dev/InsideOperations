<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="tanks" data-name="Storage Tank Dome Roof">
    <!-- Tank body -->
    <rect x="15" y="42" width="70" height="46" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flat bottom line -->
    <line x1="15" y1="88" x2="85" y2="88" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Dome roof (semicircle) -->
    <path d="M15,42 Q15,12 50,12 Q85,12 85,42" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Vent nozzle at top of dome -->
    <line x1="50" y1="12" x2="50" y2="3" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Inlet nozzle (side upper) -->
    <line x1="85" y1="55" x2="98" y2="55" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle (side lower) -->
    <line x1="85" y1="74" x2="98" y2="74" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Drain nozzle (bottom) -->
    <line x1="50" y1="88" x2="50" y2="98" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
