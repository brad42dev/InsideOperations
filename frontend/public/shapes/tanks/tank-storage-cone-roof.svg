<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="tanks" data-name="Storage Tank Cone Roof">
    <!-- Tank body -->
    <rect x="15" y="38" width="70" height="50" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flat bottom line (solid) -->
    <line x1="15" y1="88" x2="85" y2="88" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Cone roof (triangle) -->
    <polygon points="15,38 85,38 50,12" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Vent nozzle at apex -->
    <line x1="50" y1="12" x2="50" y2="3" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Inlet nozzle (side upper) -->
    <line x1="85" y1="52" x2="98" y2="52" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle (side lower) -->
    <line x1="85" y1="72" x2="98" y2="72" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Drain nozzle (bottom) -->
    <line x1="50" y1="88" x2="50" y2="98" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
