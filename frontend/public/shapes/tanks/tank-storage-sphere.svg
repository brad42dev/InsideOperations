<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="tanks" data-name="Storage Sphere">
    <!-- Spherical tank -->
    <circle cx="50" cy="45" r="34" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Support leg left -->
    <line x1="32" y1="76" x2="22" y2="95" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Support leg right -->
    <line x1="68" y1="76" x2="78" y2="95" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Ground line -->
    <line x1="18" y1="95" x2="82" y2="95" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Top nozzle (vent/fill) -->
    <line x1="50" y1="11" x2="50" y2="3" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Side nozzle (inlet) -->
    <line x1="84" y1="45" x2="96" y2="45" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Bottom nozzle (drain) -->
    <line x1="50" y1="79" x2="50" y2="88" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
