<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="tank-storage-open-top"
     data-io-version="2"
     data-io-category="tanks"
     viewBox="0 0 70 70">
  <g class="io-shape-body">
    <!-- Left wall -->
    <line x1="10" y1="15" x2="10" y2="60" stroke="#808080" stroke-width="1.5"/>
    <!-- Right wall -->
    <line x1="60" y1="15" x2="60" y2="60" stroke="#808080" stroke-width="1.5"/>
    <!-- Bottom -->
    <line x1="10" y1="60" x2="60" y2="60" stroke="#808080" stroke-width="1.5"/>
    <!-- Left rim cap -->
    <line x1="6" y1="15" x2="14" y2="15" stroke="#808080" stroke-width="1.5"/>
    <!-- Right rim cap -->
    <line x1="56" y1="15" x2="64" y2="15" stroke="#808080" stroke-width="1.5"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-left" cx="8" cy="38"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-right" cx="62" cy="38"/>
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="35" cy="62"/>
  </g>
  <g class="io-shape-part-support"></g>
</svg>
