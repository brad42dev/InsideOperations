<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="tanks" data-name="Storage Tank Open Top">
    <!-- Left wall -->
    <line x1="15" y1="20" x2="15" y2="88" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Right wall -->
    <line x1="85" y1="20" x2="85" y2="88" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Flat bottom -->
    <line x1="15" y1="88" x2="85" y2="88" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Short top rim lines (open top, not connected) -->
    <line x1="15" y1="20" x2="25" y2="20" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="75" y1="20" x2="85" y2="20" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Inlet nozzle (side upper) -->
    <line x1="85" y1="40" x2="98" y2="40" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle (side lower) -->
    <line x1="85" y1="68" x2="98" y2="68" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Drain nozzle (bottom) -->
    <line x1="50" y1="88" x2="50" y2="98" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
