<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="pumps" data-name="Centrifugal Pump">
    <!-- Pump casing circle (ISA 5.1) -->
    <circle cx="55" cy="55" r="30" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Impeller triangle pointing right (inside circle) -->
    <polygon points="35,55 65,38 65,72" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Inlet nozzle from left -->
    <line x1="0" y1="55" x2="25" y2="55" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle from top -->
    <line x1="55" y1="25" x2="55" y2="5" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Driver connection shaft line (right side) -->
    <line x1="85" y1="55" x2="100" y2="55" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
