<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="pumps" data-name="Positive Displacement Pump">
    <!-- Pump body rectangle -->
    <rect x="20" y="30" width="60" height="40" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Left lobe (gear symbol) -->
    <circle cx="38" cy="50" r="10" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
    <!-- Right lobe -->
    <circle cx="62" cy="50" r="10" fill="none" stroke="#8a8a8a" stroke-width="1.5"/>
    <!-- Lobe mesh line (intermeshing indication) -->
    <line x1="50" y1="40" x2="50" y2="60" stroke="#8a8a8a" stroke-width="1" stroke-dasharray="2,2"/>
    <!-- Inlet nozzle left -->
    <line x1="0" y1="50" x2="20" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Outlet nozzle right -->
    <line x1="80" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Driver shaft top -->
    <line x1="38" y1="30" x2="38" y2="15" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="62" y1="30" x2="62" y2="15" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
