<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="vessels" data-name="Vertical Vessel">
    <!-- Cylindrical body -->
    <rect x="30" y="22" width="40" height="56" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Domed top (ellipse cap) -->
    <ellipse cx="50" cy="22" rx="20" ry="8" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Domed bottom (ellipse cap) -->
    <ellipse cx="50" cy="78" rx="20" ry="8" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Top nozzle -->
    <line x1="50" y1="14" x2="50" y2="5" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Bottom nozzle -->
    <line x1="50" y1="86" x2="50" y2="95" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Side nozzle (inlet) -->
    <line x1="30" y1="45" x2="15" y2="45" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Side nozzle (outlet) -->
    <line x1="70" y1="60" x2="85" y2="60" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
