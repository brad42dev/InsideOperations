<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="vessels" data-name="Horizontal Vessel">
    <!-- Cylindrical body -->
    <rect x="22" y="30" width="56" height="40" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Left domed end cap -->
    <ellipse cx="22" cy="50" rx="8" ry="20" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Right domed end cap -->
    <ellipse cx="78" cy="50" rx="8" ry="20" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Left nozzle -->
    <line x1="5" y1="50" x2="14" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Right nozzle -->
    <line x1="86" y1="50" x2="95" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Top nozzle (inlet) -->
    <line x1="40" y1="30" x2="40" y2="15" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Bottom nozzle (drain) -->
    <line x1="60" y1="70" x2="60" y2="85" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
