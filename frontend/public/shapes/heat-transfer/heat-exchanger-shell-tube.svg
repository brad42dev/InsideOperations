<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="heat-transfer" data-name="Shell and Tube Heat Exchanger">
    <!-- Shell body rectangle -->
    <rect x="18" y="36" width="64" height="28" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Left tube sheet circle -->
    <ellipse cx="18" cy="50" rx="8" ry="14" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Right tube sheet circle -->
    <ellipse cx="82" cy="50" rx="8" ry="14" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Tube lines through shell (2 tubes) -->
    <line x1="18" y1="44" x2="82" y2="44" stroke="#8a8a8a" stroke-width="1.5"/>
    <line x1="18" y1="56" x2="82" y2="56" stroke="#8a8a8a" stroke-width="1.5"/>
    <!-- Shell-side inlet nozzle (top) -->
    <line x1="50" y1="36" x2="50" y2="22" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Shell-side outlet nozzle (bottom) -->
    <line x1="50" y1="64" x2="50" y2="78" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Tube-side inlet left -->
    <line x1="0" y1="50" x2="10" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Tube-side outlet right -->
    <line x1="90" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
