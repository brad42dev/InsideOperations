<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="heat-transfer" data-name="Cooler">
    <!-- Cooler body rectangle -->
    <rect x="15" y="25" width="70" height="50" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Zigzag cooling coil inside -->
    <polyline points="25,38 35,48 45,38 55,48 65,38 75,48"
              fill="none" stroke="#8a8a8a" stroke-width="2" stroke-linejoin="round"/>
    <polyline points="25,58 35,68 45,58 55,68 65,58 75,68"
              fill="none" stroke="#8a8a8a" stroke-width="2" stroke-linejoin="round"/>
    <!-- Process fluid inlet (left) -->
    <line x1="0" y1="50" x2="15" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Process fluid outlet (right) -->
    <line x1="85" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Cooling medium inlet (top) -->
    <line x1="35" y1="25" x2="35" y2="10" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Cooling medium outlet (top) -->
    <line x1="65" y1="25" x2="65" y2="10" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
