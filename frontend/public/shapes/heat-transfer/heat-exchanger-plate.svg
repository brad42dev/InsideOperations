<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="heat-transfer" data-name="Plate Heat Exchanger">
    <!-- Left end cap -->
    <rect x="12" y="30" width="8" height="40" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Right end cap -->
    <rect x="80" y="30" width="8" height="40" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Parallel plate lines (6 plates) -->
    <line x1="28" y1="30" x2="28" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="38" y1="30" x2="38" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="48" y1="30" x2="48" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="58" y1="30" x2="58" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="68" y1="30" x2="68" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Top and bottom frame bars -->
    <line x1="12" y1="30" x2="88" y2="30" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="12" y1="70" x2="88" y2="70" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Fluid 1 connections (left side) -->
    <line x1="0" y1="38" x2="12" y2="38" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="0" y1="62" x2="12" y2="62" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Fluid 2 connections (right side) -->
    <line x1="88" y1="38" x2="100" y2="38" stroke="#8a8a8a" stroke-width="2"/>
    <line x1="88" y1="62" x2="100" y2="62" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
