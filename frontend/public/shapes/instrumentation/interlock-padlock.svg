<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="interlock-padlock"
     data-io-version="2"
     data-io-category="instrumentation"
     viewBox="0 0 40 50">
  <g class="io-shape-body">
    <!-- Shackle -->
    <path d="M13,22 L13,14 A7,7 0 0,1 27,14 L27,22" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Lock body -->
    <rect x="8" y="22" width="24" height="20" rx="2" fill="none" stroke="#808080" stroke-width="1.5"/>
    <!-- Keyhole -->
    <circle cx="20" cy="31" r="3" fill="none" stroke="#808080" stroke-width="0.75"/>
    <line x1="20" y1="34" x2="20" y2="38" stroke="#808080" stroke-width="0.75"/>
  </g>
  <g class="io-connections" display="none">
    <!-- Top of shackle arc: center (20,14) r=7, top at y=7 -->
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-top" cx="20" cy="5"/>
    <!-- Bottom of lock body at y=42 -->
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-bottom" cx="20" cy="44"/>
  </g>
</svg>
