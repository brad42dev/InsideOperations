<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="drivers" data-name="Turbine">
    <!-- Turbine casing circle -->
    <circle cx="50" cy="50" r="32" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Blade 1 -->
    <path d="M50,50 Q42,36 50,22" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Blade 2 -->
    <path d="M50,50 Q64,42 78,50" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Blade 3 -->
    <path d="M50,50 Q58,64 50,78" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Blade 4 -->
    <path d="M50,50 Q36,58 22,50" fill="none" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Center hub -->
    <circle cx="50" cy="50" r="5" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Shaft right -->
    <line x1="82" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Steam/gas inlet top -->
    <line x1="50" y1="18" x2="50" y2="5" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
