<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="drivers" data-name="Motor">
    <!-- Motor circle (ISA 5.1 motor symbol) -->
    <circle cx="50" cy="50" r="32" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- M letter inside -->
    <text x="50" y="57" text-anchor="middle" font-size="26" font-weight="bold"
          fill="#8a8a8a" font-family="sans-serif" stroke="none">M</text>
    <!-- Shaft connection right -->
    <line x1="82" y1="50" x2="100" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Power supply connection top -->
    <line x1="50" y1="18" x2="50" y2="5" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
