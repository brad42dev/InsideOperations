<svg xmlns="http://www.w3.org/2000/svg"
     data-io-shape="mixer-agitator"
     data-io-version="2"
     data-io-category="mixers"
     viewBox="0 0 60 30">
  <g class="io-shape-body">
    <!-- Shaft -->
    <line x1="30" y1="2" x2="30" y2="14" stroke="#808080" stroke-width="0.75"/>
    <!-- Left blade -->
    <path class="io-stateful" d="M30,14 C30,15 8,18 8,14 C8,10 30,13 30,14 Z" fill="none" stroke="#808080" stroke-width="0.75"/>
    <!-- Right blade -->
    <path class="io-stateful" d="M30,14 C30,15 52,18 52,14 C52,10 30,13 30,14 Z" fill="none" stroke="#808080" stroke-width="0.75"/>
  </g>
  <g class="io-connections" display="none">
    <circle r="2" fill="none" stroke="#4A9EFF" stroke-width="1" data-io-conn-id="nozzle-shaft" cx="30" cy="0"/>
  </g>
  <g class="io-shape-part-agitator"></g>
