<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g class="io-shape" data-category="instruments" data-name="Panel Instrument">
    <!-- Circle body -->
    <circle cx="50" cy="50" r="35" fill="white" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Horizontal dividing line (panel-mounted: ISA 5.1 solid horizontal bar) -->
    <line x1="15" y1="50" x2="85" y2="50" stroke="#8a8a8a" stroke-width="2"/>
    <!-- Tag zone top half -->
    <text x="50" y="44" text-anchor="middle" font-size="11" fill="#8a8a8a" font-family="sans-serif" class="io-tag-zone">TAG</text>
    <!-- Connection point bottom -->
    <line x1="50" y1="85" x2="50" y2="100" stroke="#8a8a8a" stroke-width="2"/>
  </g>
</svg>
